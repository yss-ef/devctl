name: "Mark stale issues and pull requests"

on:
  schedule:
  - cron: "30 1 * * *"

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
    - uses: actions/stale@v10
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        stale-issue-message: 'This issue is stale because it has been open 60 days with no activity. Remove stale label or comment or this will be closed in 7 days.'
        stale-pr-message: 'This pull request is stale because it has been open 60 days with no activity. Remove stale label or comment or this will be closed in 7 days.'
        close-issue-message: 'This issue was closed because it has been inactive for 7 days since being marked stale.'
        close-pr-message: 'This pull request was closed because it has been inactive for 7 days since being marked stale.'
        days-before-stale: 60
        days-before-close: 7
